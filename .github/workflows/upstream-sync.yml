name: Upstream Sync

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday 09:00 UTC
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/temporalio/temporal.git

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Attempt merge on dated branch
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          if git merge upstream/main --no-edit; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            git add -A
            git commit -m "chore: upstream sync $(date +%Y-%m-%d) — conflicts need resolution"
          fi

      - name: Fast-forward main (clean merge)
        if: steps.merge.outputs.clean == 'true'
        run: |
          git checkout main
          git merge "${{ steps.merge.outputs.branch }}" --ff-only
          git push origin main

      - name: Open draft PR (conflicts)
        if: steps.merge.outputs.clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.merge.outputs.branch }}"
          CONFLICTS=$(git diff --name-only --diff-filter=U || git show --stat HEAD | grep '^' | tail -n +2 | head -20)
          git push origin "$BRANCH"
          BODY="Upstream merge has conflicts. Resolve and push to merge into \`main\`."$'\n\n'"**Conflicting files:**"$'\n```\n'"${CONFLICTS}"$'\n```'
          gh pr create \
            --draft \
            --title "chore: upstream sync $(date +%Y-%m-%d) — conflicts" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
